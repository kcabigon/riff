<svg width="40" height="44" viewBox="0 0 40 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Drop shadow -->
  <ellipse cx="20" cy="42" rx="12" ry="2.5" fill="#606060" opacity="0.4"/>

  <!-- Can body (trapezoid, slightly wider at bottom) -->
  <path d="M8 15 L7 38 L33 38 L32 15 Z" fill="#B8B8B8"/>

  <!-- Body left highlight -->
  <path d="M8 15 L7.5 38 L11 38 L11.5 15 Z" fill="#E0E0E0"/>

  <!-- Body right shadow -->
  <path d="M28.5 15 L29 38 L32.5 38 L32 15 Z" fill="#888888"/>

  <!-- Vertical ridges -->
  <line x1="14" y1="15.5" x2="13.5" y2="37.5" stroke="#909090" stroke-width="1.5"/>
  <line x1="18" y1="15.5" x2="17.5" y2="37.5" stroke="#909090" stroke-width="1.5"/>
  <line x1="22" y1="15.5" x2="21.5" y2="37.5" stroke="#909090" stroke-width="1.5"/>
  <line x1="26" y1="15.5" x2="25.5" y2="37.5" stroke="#909090" stroke-width="1.5"/>

  <!-- Body bottom rim -->
  <path d="M7 36 L7 38 L33 38 L33 36 Z" fill="#909090"/>

  <!-- Body outline -->
  <path d="M8 15 L7 38 L33 38 L32 15 Z" stroke="#404040" stroke-width="1.5" stroke-linejoin="round" fill="none"/>

  <!-- Lid -->
  <rect x="6" y="11" width="28" height="5" rx="1.5" fill="#CCCCCC" stroke="#404040" stroke-width="1.5"/>
  <!-- Lid top highlight -->
  <rect x="7.5" y="11.5" width="25" height="2" rx="1" fill="#EEEEEE"/>
  <!-- Lid bottom shadow -->
  <rect x="7.5" y="14.5" width="25" height="1" rx="0.5" fill="#A0A0A0"/>

  <!-- Handle base -->
  <rect x="15" y="5" width="10" height="7" rx="3" fill="#BBBBBB" stroke="#404040" stroke-width="1.5"/>
  <!-- Handle highlight -->
  <rect x="16.5" y="6" width="7" height="2.5" rx="1.5" fill="#E0E0E0"/>
</svg>
